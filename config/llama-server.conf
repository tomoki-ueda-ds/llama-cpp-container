###############################################################################
# llama-server configuration
#
# Optimized for:
#   - NVIDIA H100 (80 GB)
#   - Single-user interactive sessions
#   - Slurm-managed HPC environments
#   - GGUF models
#
# The model path is supplied by run-server.sh.
###############################################################################

#------------------------------------------------------------------------------
# Network
#------------------------------------------------------------------------------

--host 0.0.0.0
--port 18000

#------------------------------------------------------------------------------
# Context
#------------------------------------------------------------------------------

--ctx-size 32768

#------------------------------------------------------------------------------
# GPU
#------------------------------------------------------------------------------

-ngl 999

--flash-attn auto

#------------------------------------------------------------------------------
# Batch
#------------------------------------------------------------------------------

--batch-size 2048
--ubatch-size 512

#------------------------------------------------------------------------------
# Threads
#------------------------------------------------------------------------------

--threads -1

#------------------------------------------------------------------------------
# KV cache
#------------------------------------------------------------------------------

--cache-type-k q8_0
--cache-type-v q8_0

#------------------------------------------------------------------------------
# Performance
#------------------------------------------------------------------------------

--cont-batching

#------------------------------------------------------------------------------
# API
#------------------------------------------------------------------------------

--metrics

#------------------------------------------------------------------------------
# Logging
#------------------------------------------------------------------------------

--log-timestamps