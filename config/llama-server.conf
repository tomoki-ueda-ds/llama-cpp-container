###############################################################################
# llama-server configuration
#
# This configuration is optimized for:
#   - NVIDIA H100 (80 GB)
#   - Single-user interactive sessions
#   - Slurm-managed HPC environments
#   - GGUF models
#
# The model path is specified at runtime.
#
###############################################################################

#------------------------------------------------------------------------------
# Network
#------------------------------------------------------------------------------

--host 0.0.0.0
--port 8000

#------------------------------------------------------------------------------
# Context
#------------------------------------------------------------------------------

--ctx-size 32768

#------------------------------------------------------------------------------
# GPU
#------------------------------------------------------------------------------

-ngl 99

--flash-attn

#------------------------------------------------------------------------------
# Batch
#------------------------------------------------------------------------------

--batch-size 2048

--ubatch-size 512

#------------------------------------------------------------------------------
# Threads
#------------------------------------------------------------------------------

--threads -1

#------------------------------------------------------------------------------
# Cache
#------------------------------------------------------------------------------

--cache-type-k q8_0
--cache-type-v q8_0

#------------------------------------------------------------------------------
# Performance
#------------------------------------------------------------------------------

--cont-batching

#------------------------------------------------------------------------------
# API
#------------------------------------------------------------------------------

--metrics

#------------------------------------------------------------------------------
# Logging
#------------------------------------------------------------------------------

--log-timestamps

###############################################################################
# Example
#
# llama-server \
#     -m /models/qwen2.5-coder-32b-instruct-q5_k_m.gguf \
#     $(cat config/llama-server.conf)
#
###############################################################################